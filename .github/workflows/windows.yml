name: Windows CI and Release

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache-dependency-path: |
            vegad/go.sum
            vega-agent/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm
          cache-dependency-path: vega/package-lock.json

      - name: Sincronizar versão com a tag
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: vega
        shell: pwsh
        run: npm version $env:GITHUB_REF_NAME.Substring(1) --no-git-tag-version

      - name: Instalar dependências
        working-directory: vega
        run: npm ci

      - name: Testar agente
        working-directory: vega-agent
        run: go test ./...

      - name: Validar Electron
        working-directory: vega
        run: |
          npm test
          npm run typecheck
          npm run build

      - name: Gerar instalador NSIS
        working-directory: vega
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run package:windows

      - name: Exigir e validar Authenticode em release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WIN_CSC_LINK)) { throw "WIN_CSC_LINK não configurado" }
          $files = @(
            "vega/dist/Vega-Setup-*-x64.exe",
            "vega/dist/win-unpacked/Vega.exe",
            "vega/dist/win-unpacked/resources/bin/vega-agent.exe"
          ) | Get-Item
          foreach ($file in $files) {
            $signature = Get-AuthenticodeSignature $file
            if ($signature.Status -ne "Valid") { throw "Assinatura inválida: $($file.FullName) [$($signature.Status)]" }
          }

      - name: Gerar checksums
        shell: pwsh
        run: |
          Get-ChildItem "vega/dist/Vega-Setup-*-x64.exe" | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
            "$hash  $($_.Name)" | Set-Content "$($_.FullName).sha256"
          }

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            vega/dist/Vega-Setup-*-x64.exe
            vega/dist/Vega-Setup-*-x64.exe.sha256

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows-x64
          path: artifacts

      - name: Publicar na GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          gh release view $tag --repo $env:GITHUB_REPOSITORY 2>$null
          if ($LASTEXITCODE -ne 0) { gh release create $tag --repo $env:GITHUB_REPOSITORY --title $tag --generate-notes }
          gh release upload $tag artifacts/Vega-Setup-*-x64.exe artifacts/Vega-Setup-*-x64.exe.sha256 --repo $env:GITHUB_REPOSITORY --clobber
