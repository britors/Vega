name: Release RPMs (openSUSE)

# Builda vegad e a interface GTK em RPMs independentes a partir dos specs
# em packaging/opensuse/ e anexa os dois na GitHub Release da tag empurrada.
# Empacotamento ainda de teste, ver packaging/opensuse/vegad.spec.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container: opensuse/leap:16.0
    steps:
      - name: Instalar dependências de build
        run: |
          zypper --non-interactive install -y tar gzip go rust cargo gcc \
            pkg-config gtk4-devel libadwaita-devel \
            rpm-build rpmdevtools \
            checkpolicy policycoreutils

      - uses: actions/checkout@v7

      - name: Buildar os RPMs
        run: |
          version="${GITHUB_REF_NAME#v}"
          version="${version%%-*}"
          rpmdev-setuptree
          tar czf "$HOME/rpmbuild/SOURCES/vega-src.tar.gz" \
            --exclude='.git' \
            --exclude='vega-gtk/target' \
            .
          rpmbuild -bb --define "version $version" packaging/opensuse/vegad.spec
          rpmbuild -bb --define "version $version" packaging/opensuse/vega.spec
          rpmbuild -bb --define "version $version" packaging/opensuse/vega-cli.spec

      - name: Coletar RPMs finais (sem debuginfo/debugsource)
        run: |
          mkdir -p dist
          # vega-cli.spec é BuildArch:noarch (puro shell), então seu RPM
          # sai em RPMS/noarch, não RPMS/x86_64 como vegad/vega-gtk.
          find "$HOME/rpmbuild/RPMS/x86_64" "$HOME/rpmbuild/RPMS/noarch" -maxdepth 1 -name '*.rpm' \
            ! -name '*debuginfo*' ! -name '*debugsource*' -exec cp {} dist/ \;
          ls -lh dist/

      - name: Validar instalação
        run: |
          zypper --non-interactive --no-gpg-checks install -y dist/*.rpm
          test -x /usr/bin/vega-gtk
          test -x /usr/lib/vega/vegad
          test -f /usr/share/applications/vega.desktop
          test -x /usr/bin/vega
          test -x /usr/lib/vega-cli/bin/vega

      - uses: actions/upload-artifact@v4
        with:
          name: opensuse-rpms
          path: dist/*.rpm

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: opensuse-rpms
          path: dist

      - name: Publicar RPMs na release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if ! gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$tag" --repo "$GITHUB_REPOSITORY" --title "$tag" --generate-notes
          fi
          gh release upload "$tag" dist/*.rpm --repo "$GITHUB_REPOSITORY" --clobber
          gh release edit "$tag" --repo "$GITHUB_REPOSITORY" --draft=false

  # Além de publicar os RPMs pré-compilados acima, dispara o build "de
  # verdade" no openSUSE Build Service (home:rodrigosbrito:vega), que tem
  # seu próprio _service (tar_scm com match-tag: v*) buscando a mesma tag
  # direto do GitHub — este job só avisa o OBS pra rebuscar e rebuildar,
  # via https://openbuildservice.org/help/manuals/obs-user-guide/cha-obs-authorization-token
  # Cada pacote (vega-gtk, vegad, vega-cli — mesmo trio de
  # packaging/opensuse/*.spec) tem seu próprio token de trigger, escopado
  # só pra "runservice" naquele pacote (osc token --create --operation
  # runservice <projeto> <pacote>), guardado como secret. Depende só de `publish`
  # (a release do GitHub já está no ar antes de avisar o OBS) e é
  # best-effort: falha aqui não desfaz a release, e cada step é pulado sem
  # erro enquanto o secret correspondente ainda não existir (setup do lado
  # OBS ainda em andamento).
  trigger-obs:
    needs: publish
    runs-on: ubuntu-latest
    env:
      OBS_API: https://api.opensuse.org
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detectar pacotes alterados desde a tag anterior
        id: changes
        shell: bash
        run: |
          previous_tag="$(git describe --tags --abbrev=0 "$GITHUB_SHA^" 2>/dev/null || true)"

          changed() {
            local output="$1"
            shift
            if [ -z "$previous_tag" ] || ! git diff --quiet "$previous_tag" "$GITHUB_SHA" -- "$@"; then
              echo "$output=true" >> "$GITHUB_OUTPUT"
            else
              echo "$output=false" >> "$GITHUB_OUTPUT"
            fi
          }

          changed vega_gtk \
            vega-gtk lyra-vega-dbus dbus Cargo.toml Cargo.lock \
            packaging/vega packaging/opensuse/vega.spec packaging/obs/vega-gtk.spec
          changed vegad \
            vegad dbus packaging/vegad \
            packaging/opensuse/vegad.spec packaging/obs/vegad.spec
          changed vega_cli \
            vega-cli dbus packaging/opensuse/vega-cli.spec packaging/obs/vega-cli.spec

      # O contexto `secrets` não pode ser referenciado direto num `if:` de
      # step (erro do parser do Actions: "Unrecognized named-value:
      # 'secrets'") — passa o token por env: (isso sim é aceito) e faz o
      # "pular se não configurado" dentro do próprio shell.
      #
      # if: always() em cada step: por padrão, o Actions pula os steps
      # seguintes assim que um falha — mas os 3 disparos são operações
      # independentes por pacote (um pacote falhar/ter conflito de serviço
      # no OBS não deve impedir os outros dois de disparar).
      - name: Disparar rebuild no OBS (vega-gtk)
        if: always() && steps.changes.outputs.vega_gtk == 'true'
        env:
          OBS_TOKEN: ${{ secrets.OBS_TOKEN_VEGA_GTK }}
        run: |
          if [ -z "$OBS_TOKEN" ]; then
            echo "OBS_TOKEN_VEGA_GTK não configurado, pulando." >&2
            exit 0
          fi
          # --fail-with-body mantém o XML de erro do OBS no log. `-f`
          # sozinho escondia mensagens essenciais como
          # "no source service defined!".
          curl --fail-with-body --silent --show-error \
            -H "Authorization: Token $OBS_TOKEN" \
            -X POST "$OBS_API/trigger/runservice"

      - name: Disparar rebuild no OBS (vegad)
        if: always() && steps.changes.outputs.vegad == 'true'
        env:
          OBS_TOKEN: ${{ secrets.OBS_TOKEN_VEGAD }}
        run: |
          if [ -z "$OBS_TOKEN" ]; then
            echo "OBS_TOKEN_VEGAD não configurado, pulando." >&2
            exit 0
          fi
          curl --fail-with-body --silent --show-error \
            -H "Authorization: Token $OBS_TOKEN" \
            -X POST "$OBS_API/trigger/runservice"

      - name: Disparar rebuild no OBS (vega-cli)
        if: always() && steps.changes.outputs.vega_cli == 'true'
        env:
          OBS_TOKEN: ${{ secrets.OBS_TOKEN_VEGA_CLI }}
        run: |
          if [ -z "$OBS_TOKEN" ]; then
            echo "OBS_TOKEN_VEGA_CLI não configurado, pulando." >&2
            exit 0
          fi
          curl --fail-with-body --silent --show-error \
            -H "Authorization: Token $OBS_TOKEN" \
            -X POST "$OBS_API/trigger/runservice"
