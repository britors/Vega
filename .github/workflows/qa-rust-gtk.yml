name: QA Rust + GTK4

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  rust:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Dependências GTK
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Formatação, testes, lint e release
        working-directory: vega-gtk
        run: |
          cargo fmt --check
          cargo test --locked
          cargo clippy --locked -- -D warnings
          cargo build --release --locked

  daemon:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: vegad/go.mod
      - name: Testes do daemon e mocks D-Bus
        working-directory: vegad
        run: go test ./...

  package-policy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Pacotes finais não incluem Electron/Node
        run: |
          files=(packaging/vega/PKGBUILD packaging/fedora/vega.spec \
            packaging/opensuse/vega.spec packaging/debian-src/debian/control \
            packaging/debian-src/debian/rules .github/workflows/release-*.yml)
          ! grep -Ei '(electron|node_modules|npm (ci|install|run)|nodejs)' "${files[@]}"
          grep -q 'cargo build --release --locked' packaging/vega/PKGBUILD
