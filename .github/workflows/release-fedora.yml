name: Release RPMs (Fedora)
# Builda vegad e a interface GTK em RPMs independentes a partir dos specs em
# packaging/fedora/ e anexa os dois na GitHub Release da tag empurrada.
# Empacotamento ainda de teste, ver packaging/fedora/vegad.spec.
#
# Usa o container "fedora:latest" (não uma versão fixa como o workflow do
# openSUSE usa "opensuse/leap:16.0") porque não há uma versão Fedora
# concreta e atual confiável pra fixar aqui — o dist tag (.fcNN) é
# calculado em tempo de build via `rpm -E %fedora`, então o workflow segue
# a versão que o Fedora tiver estável no momento do build.
on:
  push:
    tags:
      - "v*"
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - name: Instalar dependências de build
        run: |
          dnf install -y golang rust cargo gcc curl pkgconf-pkg-config \
            gtk4-devel libadwaita-devel \
            rpm-build rpmdevtools \
            checkpolicy policycoreutils
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Buildar os RPMs
        run: |
          version="${GITHUB_REF_NAME#v}"
          version="${version%%-*}"
          fedora_rel="$(rpm -E %fedora)"
          rpmdev-setuptree
          tar czf "$HOME/rpmbuild/SOURCES/vega-src.tar.gz" \
            --exclude='.git' \
            --exclude='vega-gtk/target' \
            .
          rpmbuild -bb --define "version $version" --define "dist .fc${fedora_rel}" packaging/fedora/vegad.spec
          rpmbuild -bb --define "version $version" --define "dist .fc${fedora_rel}" packaging/fedora/vega.spec
          rpmbuild -bb --define "version $version" --define "dist .fc${fedora_rel}" packaging/fedora/vega-cli.spec
      - name: Coletar RPMs finais (sem debuginfo/debugsource)
        run: |
          mkdir -p dist
          # vega-cli.spec é BuildArch:noarch (puro shell), então seu RPM
          # sai em RPMS/noarch, não RPMS/x86_64 como vegad/vega-gtk.
          find "$HOME/rpmbuild/RPMS/x86_64" "$HOME/rpmbuild/RPMS/noarch" -maxdepth 1 -name '*.rpm' \
            ! -name '*debuginfo*' ! -name '*debugsource*' -exec cp {} dist/ \;
          ls -lh dist/
      - name: Validar instalação
        run: |
          dnf install -y dist/*.rpm
          test -x /usr/bin/lyra-vega-gtk
          test -x /usr/lib/vega/vegad
          test -f /usr/share/applications/vega.desktop
          test -x /usr/bin/vega
          test -x /usr/lib/vega-cli/bin/vega
          test -f /usr/share/applications/vega-cli.desktop
      - uses: actions/upload-artifact@v4
        with:
          name: fedora-rpms
          path: dist/*.rpm
  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: fedora-rpms
          path: dist
      - name: Publicar RPMs na release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if ! gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$tag" --repo "$GITHUB_REPOSITORY" --title "$tag" --generate-notes
          fi
          gh release upload "$tag" dist/*.rpm --repo "$GITHUB_REPOSITORY" --clobber
          gh release edit "$tag" --repo "$GITHUB_REPOSITORY" --draft=false
