<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Only root (vegad runs as root) may own
       this bus name — no other process, privileged or not, can squat it. -->
  <policy user="root">
    <allow own="org.lyraos.Vega1"/>
  </policy>

  <!-- Any local user can call methods and receive signals; per-method
       authorization is enforced by vegad via polkit
       (org.lyraos.vega.policy), not by this D-Bus policy. -->
  <policy context="default">
    <allow send_destination="org.lyraos.Vega1"/>
    <allow receive_sender="org.lyraos.Vega1"/>
  </policy>
</busconfig>
